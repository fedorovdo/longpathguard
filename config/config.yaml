app:
  language: ru
  audit_mode: true
watcher:
  root_path: D:\fs
  excluded_paths:
  - D:\_LongPathQuarantine
  - data
  modified_debounce_seconds: 2
thresholds:
  max_full_path_warning: 220
  max_full_path_danger: 240
  max_full_path_critical: 260
  max_name_length: 120
scanner:
  max_scan_items: 10000
telegram:
  enabled: false
  bot_token: ''
  chat_id: ''
  min_severity: critical
email:
  enabled: false
  smtp_host: ''
  smtp_port: 587
  smtp_user: ''
  smtp_password: ''
  from_addr: ''
  to_addr: ''
  use_tls: true
  min_severity: critical
