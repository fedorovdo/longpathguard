<!doctype html>
<html lang="{{ language }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ t("app_name") }}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="brand">{{ t("app_name") }}</div>
    <nav class="nav">
      <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">{{ t("dashboard") }}</a>
      <a href="/events" class="{% if request.url.path.startswith('/events') %}active{% endif %}">{{ t("events") }}</a>
      <a href="/scan" class="{% if request.url.path == '/scan' %}active{% endif %}">{{ t("scan") }}</a>
      <a href="/settings" class="{% if request.url.path == '/settings' %}active{% endif %}">{{ t("settings") }}</a>
    </nav>
    <form class="language-switch" method="post" action="/language">
      <button type="submit" name="language" value="ru" class="{% if language == 'ru' %}active{% endif %}">RU</button>
      <button type="submit" name="language" value="en" class="{% if language == 'en' %}active{% endif %}">EN</button>
    </form>
  </header>
  <main class="page">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
