{% extends "base.html" %}
{% block content %}
<section class="section">
  <div class="section-header">
    <h1>{{ t("events") }}</h1>
    <a class="button secondary" href="/events/export.csv?{{ request.url.query }}">{{ t("export_csv") }}</a>
  </div>
  <form class="filters" method="get" action="/events">
    <label>{{ t("severity") }}
      <select name="severity">
        <option value="">{{ t("all") }}</option>
        {% for item in severity_values %}
          <option value="{{ item }}" {% if filters.severity == item %}selected{% endif %}>{{ item }}</option>
        {% endfor %}
      </select>
    </label>
    <label>{{ t("event_type") }}
      <select name="event_type">
        <option value="">{{ t("all") }}</option>
        {% for item in event_type_values %}
          <option value="{{ item }}" {% if filters.event_type == item %}selected{% endif %}>{{ t(item) }}</option>
        {% endfor %}
      </select>
    </label>
    <label>{{ t("date_from") }}<input type="date" name="date_from" value="{{ filters.date_from }}"></label>
    <label>{{ t("date_to") }}<input type="date" name="date_to" value="{{ filters.date_to }}"></label>
    <label class="grow">{{ t("search") }}<input type="search" name="search" value="{{ filters.search }}"></label>
    <label>{{ t("limit") }}
      <select name="limit">
        {% for item in [50, 100, 500] %}
          <option value="{{ item }}" {% if limit == item %}selected{% endif %}>{{ item }}</option>
        {% endfor %}
      </select>
    </label>
    <button class="button" type="submit">{{ t("apply") }}</button>
  </form>
  {% include "_events_table.html" with context %}
</section>
{% endblock %}
